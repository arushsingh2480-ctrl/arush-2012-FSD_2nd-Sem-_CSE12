<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>online course</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: azure;
            margin:0;
            padding:0;
            scroll-behavior: smooth;
        }
        header{
            background-color: blueviolet;
            color:aquamarine;
            word-wrap: normal;
            text-decoration: underline;
            overflow: auto;
            text-align: center;
        }
        .content{
            color: blue;
            padding: 9px;
            margin: 7px;
            background-color: aquamarine;
        }
        .content ol{
            font-weight: 30px;
            cursor: auto;
        }
        .video {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: auto;
        }

        .video iframe {
        width: 100%;
        height: 500px;
        }
        footer{
            display: flex;
            background-color: aqua;
            height: auto;
            width: 2000px;
            text-align: center;
            margin-top:40px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Web Development Course</h1>
        <p>Learn html,css,java fundamentals</p>
    </header>
    <section class="content">
        <ol type="A">
            <li>Hyper Text Markup Language</li>
            <li>Cascading Style Sheets</li>
            <li>Java Script</li>
        </ol>
    </section>
    <section class="video">
        <h2>Learn Online Tutorials</h2>
        <iframe src="https://www.youtube.com/embed/UB1O30fR-EE"
      frameborder="0" allowfullscreen></iframe>
        <footer>
            @ 2026 web development course || created by arush
        </footer>
    </section>
</body>
</html>
